name: eShop Price Tracker

on:
  schedule:
    # Roda todos os dias às 13:00 UTC (10:00 no horário de Brasília)
    - cron: '0 17 * * *'
  workflow_dispatch:
    # Isso aqui cria o botão "Play" para você rodar manualmente quando quiser

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Baixando o código do repositório
        uses: actions/checkout@v4

      - name: Instalando o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão estável mais recente

      - name: Instalando dependências
        run: npm install

      - name: Executando o Script de Preços
        run: node src/index.js # Ajuste o caminho se seu arquivo principal for outro
        env:
          # Aqui mapeamos os segredos do GitHub para as variáveis de ambiente do Node
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}